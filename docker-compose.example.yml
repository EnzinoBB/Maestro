services:
  control-plane:
    build:
      context: ./control-plane
    ports:
      - "8000:8000"
    environment:
      MAESTRO_DB: /data/cp.db
      MAESTRO_LOG_LEVEL: INFO
      # SECRET — generate a strong token and store your real value in
      # docker-compose.yml (gitignored). The daemon must present the same
      # token via its config `token:` field.
      MAESTRO_DAEMON_TOKEN: CHANGE_ME
    volumes:
      - cp-data:/data
volumes:
  cp-data:
