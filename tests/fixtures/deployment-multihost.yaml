api_version: maestro/v1
project: test-multihost
description: Redis on host1, nginx on host2.

hosts:
  host1:
    type: linux
    address: 10.0.0.1         # placeholder; override in your environment
    user: deploy
  host2:
    type: linux
    address: 10.0.0.2         # placeholder; override in your environment
    user: deploy

components:
  cache:
    source:
      type: docker
      image: redis
      tag: "7-alpine"
    run:
      type: docker
      container_name: maestro-test-cache
      ports: ["16379:6379"]
      restart: unless-stopped
    healthcheck:
      type: tcp
      port: 16379
      interval: 2s
      start_period: 2s
      retries: 5
    deploy_mode: cold

  web:
    source:
      type: docker
      image: nginx
      tag: "1.27-alpine"
    run:
      type: docker
      container_name: maestro-test-web-h2
      ports: ["18082:80"]
      restart: unless-stopped
    healthcheck:
      type: http
      url: http://127.0.0.1:18082/
      expect_status: 200
      interval: 2s
      start_period: 3s
      retries: 10
    deploy_mode: cold

deployment:
  - host: host1
    components: [cache]
    strategy: sequential
  - host: host2
    components: [web]
    depends_on_hosts: [host1]
    strategy: sequential
