api_version: maestro/v1
project: bad-cycle

hosts:
  host1:
    type: linux
    address: 127.0.0.1
    user: deploy

components:
  a:
    source: {type: docker, image: nginx, tag: "1.27-alpine"}
    run: {type: docker, container_name: maestro-a}
    depends_on: [b]
  b:
    source: {type: docker, image: nginx, tag: "1.27-alpine"}
    run: {type: docker, container_name: maestro-b}
    depends_on: [a]

deployment:
  - host: host1
    components: [a, b]
