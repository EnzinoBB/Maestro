# Example credentials file (Fase 1: plaintext — encrypted in Fase 2).
# Copy to ./credentials.yaml (gitignored) next to deployment.yaml and reference
# entries via `{{ vault://<path> }}` inside deployment.yaml.

git:
  github-org:
    type: ssh
    private_key_path: /home/deploy/.ssh/id_ed25519
    # or:
    # type: token
    # token: CHANGE_ME

db:
  password: CHANGE_ME

jwt:
  secret: CHANGE_ME
